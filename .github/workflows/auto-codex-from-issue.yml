name: Auto Codex from Issue

on:
  issues:
    types: [opened, labeled, edited]

permissions:
  contents: read
  issues: write

jobs:
  request-codex:
    name: Request Codex fix
    runs-on: ubuntu-latest
    if: >-
      contains(github.event.issue.labels.*.name, 'ai-ready') &&
      !contains(github.event.issue.labels.*.name, 'ai-working') &&
      !contains(github.event.issue.labels.*.name, 'ai-failed')

    steps:
      - name: Mark issue as ai-working
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;

            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ['ai-working']
              });
            } catch (error) {
              core.warning(`Could not add ai-working label: ${error.message}`);
            }

      - name: Comment Codex task request
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueUrl = issue.html_url;

            const body = [
              '@codex',
              '',
              `Trabaja automaticamente sobre este issue: ${issueUrl}`,
              '',
              `Repositorio: ${owner}/${repo}`,
              `Issue: #${issueNumber}`,
              '',
              'Lee primero AGENTS.md y respeta sus reglas.',
              '',
              'Objetivo:',
              '- Resolver unicamente el problema descrito en este issue.',
              '- No mezclar varios bugs o mejoras en el mismo PR.',
              '- Crear una rama nueva desde main.',
              '- Crear un Pull Request hacia main.',
              '- No hacer merge directo.',
              '',
              'Reglas obligatorias:',
              '1. No modificar sincronizacion, Drift, Supabase, permisos, autenticacion o base de datos salvo que el issue lo pida explicitamente.',
              '2. Si falta informacion critica, comenta en el issue y no cambies codigo.',
              '3. Si el cambio supera 5 archivos o 300 lineas, justificalo y marca el PR como needs-human-review.',
              '4. Ejecuta antes de finalizar:',
              '   - flutter pub get',
              '   - flutter analyze',
              '   - flutter test',
              '5. Si Flutter no esta disponible, configura el entorno antes de continuar.',
              '6. Si GitHub Actions falla despues de crear el PR, corrige en la misma rama y no abras otro PR.',
              '7. Cuando el PR genere APK correctamente, deja el PR listo para revision humana.',
              '',
              'Formato minimo del PR:',
              `- Closes #${issueNumber}`,
              '- Causa encontrada',
              '- Solucion aplicada',
              '- Archivos modificados',
              '- Validaciones realizadas',
              '- Riesgos pendientes'
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body
            });
