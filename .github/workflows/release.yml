name: Release APK

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Restaurar keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          printf "storePassword=${{ secrets.KEY_STORE_PASSWORD }}\nkeyPassword=${{ secrets.KEY_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nstoreFile=keystore.jks\n" > android/key.properties

      - name: Crear .env
        run: |
          printf "SUPABASE_URL=${{ secrets.SUPABASE_URL }}\nSUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}\nSUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}\nOPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}\nOPENAI_MODEL=${{ secrets.OPENAI_MODEL }}\nOPENAI_TEMPERATURE=${{ secrets.OPENAI_TEMPERATURE }}\nOPENAI_MAX_TOKENS=${{ secrets.OPENAI_MAX_TOKENS }}\nASSISTANT_MAX_REACT_ITERATIONS=${{ secrets.ASSISTANT_MAX_REACT_ITERATIONS }}\nASSISTANT_HISTORY_TURNS=${{ secrets.ASSISTANT_HISTORY_TURNS }}\n" > .env

      - name: Instalar dependencias Flutter
        run: flutter pub get

      - name: Extraer versionName y versionCode
        id: version
        run: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d ' ')
          VERSION_CODE=$(grep '^version:' pubspec.yaml | cut -d'+' -f2 | tr -d ' ')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "apk_name=inventario-v${VERSION_NAME}.apk" >> $GITHUB_OUTPUT

      - name: Build APK release
        run: flutter build apk --release

      - name: Renombrar APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}

      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.version.outputs.version_name }}"
          body: |
            ## Cambios en v${{ steps.version.outputs.version_name }}

            Revisa `app_update/version.json` para el detalle de notas de la versión.
          files: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          draft: false
          prerelease: false

      - name: Actualizar app_update/version.json
        run: |
          TAG=${{ github.ref_name }}
          VERSION_NAME=${{ steps.version.outputs.version_name }}
          VERSION_CODE=${{ steps.version.outputs.version_code }}
          APK_NAME=${{ steps.version.outputs.apk_name }}
          REPO=${{ github.repository }}
          APK_URL="https://github.com/${REPO}/releases/download/${TAG}/${APK_NAME}"
          PUBLISHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          python3 - <<PYEOF
          import json

          path = "app_update/version.json"
          with open(path) as f:
              data = json.load(f)

          data["versionName"] = "${VERSION_NAME}"
          data["versionCode"] = int("${VERSION_CODE}")
          data["apkUrl"] = "${APK_URL}"
          data["publishedAt"] = "${PUBLISHED_AT}"

          with open(path, "w") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write("\n")
          PYEOF

      - name: Commit version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_update/version.json
          git commit -m "chore: actualizar version.json para v${{ steps.version.outputs.version_name }} [skip ci]"
          git push origin HEAD:main
