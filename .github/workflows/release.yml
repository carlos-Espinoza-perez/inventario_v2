name: Release APK

# Solo se dispara cuando se hace push de un tag con formato vX.Y.Z
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # necesario para crear GitHub Releases y hacer commit

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ─────────────────────────────────────────────────────────
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 4. Keystore ────────────────────────────────────────────────────────
      # El keystore se guarda en Base64 como secret KEYSTORE_BASE64.
      # key.properties se genera aquí para que build.gradle.kts lo lea.
      - name: Restaurar keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      # ── 5. Dependencias ────────────────────────────────────────────────────
      - name: Instalar dependencias Flutter
        run: flutter pub get

      # ── 6. Leer versión desde pubspec.yaml ─────────────────────────────────
      - name: Extraer versionName y versionCode
        id: version
        run: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d ' ')
          VERSION_CODE=$(grep '^version:' pubspec.yaml | cut -d'+' -f2 | tr -d ' ')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "apk_name=inventario-v${VERSION_NAME}.apk" >> $GITHUB_OUTPUT

      # ── 7. Compilar APK release ────────────────────────────────────────────
      - name: Build APK release
        run: flutter build apk --release

      # ── 8. Renombrar APK ───────────────────────────────────────────────────
      - name: Renombrar APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}

      # ── 9. Crear GitHub Release y subir APK ───────────────────────────────
      - name: Crear GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "v${{ steps.version.outputs.version_name }}"
          body: |
            ## Cambios en v${{ steps.version.outputs.version_name }}

            Revisa `app_update/version.json` para el detalle de notas de la versión.
          files: build/app/outputs/flutter-apk/${{ steps.version.outputs.apk_name }}
          draft: false
          prerelease: false

      # ── 10. Actualizar version.json ────────────────────────────────────────
      - name: Actualizar app_update/version.json
        run: |
          TAG=${{ github.ref_name }}
          VERSION_NAME=${{ steps.version.outputs.version_name }}
          VERSION_CODE=${{ steps.version.outputs.version_code }}
          APK_NAME=${{ steps.version.outputs.apk_name }}
          REPO=${{ github.repository }}
          APK_URL="https://github.com/${REPO}/releases/download/${TAG}/${APK_NAME}"
          PUBLISHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Preserva releaseNotes y otros campos editables del archivo actual
          # Solo actualiza los campos que dependen de la compilación
          python3 - <<PYEOF
          import json, os

          path = "app_update/version.json"
          with open(path) as f:
              data = json.load(f)

          data["versionName"] = "${VERSION_NAME}"
          data["versionCode"] = int("${VERSION_CODE}")
          data["apkUrl"] = "${APK_URL}"
          data["publishedAt"] = "${PUBLISHED_AT}"

          with open(path, "w") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
              f.write("\n")
          PYEOF

      # ── 11. Commit version.json actualizado a main ─────────────────────────
      - name: Commit version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app_update/version.json
          git commit -m "chore: actualizar version.json para v${{ steps.version.outputs.version_name }} [skip ci]"
          git push origin HEAD:main
